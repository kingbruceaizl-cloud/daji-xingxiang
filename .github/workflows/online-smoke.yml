name: 大吉形象线上冒烟验证

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 线上 https 域名，例如 https://你的域名
        required: true
        type: string

jobs:
  smoke-url:
    name: 线上域名关键页面和接口检查
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 启用 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行线上冒烟测试
        run: pnpm run smoke:url
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
