name: 大吉形象发布验证

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    name: 中文、初始化、发布包、构建和生产冒烟检查
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 启用 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 运行 CI 发布验证
        run: pnpm run verify:ci
